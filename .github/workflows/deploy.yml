name: Deploy & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: [build, deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prevtag
        run: |
          PREV=$(git tag --sort=-creatordate | sed -n '2p')
          echo "prev=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          EOF=$(openssl rand -hex 8)
          echo "log<<$EOF" >> $GITHUB_OUTPUT

          if [ -z "${{ steps.prevtag.outputs.prev }}" ]; then
            git log -n 20 --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
          else
            git log ${{ steps.prevtag.outputs.prev }}..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
          fi

          echo "" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## 🚀 Iter Catholicum ${{ steps.tag.outputs.tag }}

            ### Cambios
            ${{ steps.changelog.outputs.log }}

            ---

            🌐 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}