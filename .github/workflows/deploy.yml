# Workflow for building and deploying Iter Catholicum to GitHub Pages
# Triggers only on version tags (e.g. v1.0.0) or manual dispatch
name: Deploy & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: write   # needed to create releases
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ── 1. Build the Vite app ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ── 2. Deploy to GitHub Pages ──────────────────────────────────────────────
  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 3. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prevtag
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "log<<$EOF" >> $GITHUB_OUTPUT
          if [ -z "${{ steps.prevtag.outputs.prev }}" ]; then
            git log -n 20 --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
          else
            git log ${{ steps.prevtag.outputs.prev }}..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## 🚀 Iter Catholicum ${{ steps.tag.outputs.tag }}

            ### Cambios
            ${{ steps.changelog.outputs.log }}

            ---

            🌐 **[Abrir aplicación](https://danloi2.github.io/itercatholicum/)**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
